<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        .is-sticky {
            position: fixed !important;
            top: 0 !important;
        }
        .is-sticky2 {
          position : fixed !important;
          top: 0.5 !important;
        }
    </style>
</head>
<body class="bg-white h-[300vh]">

<div id="animation-container" class="relative mx-auto w-full aspect-[16/10] mt-24">
    <div class="text absolute inset-0 flex items-center justify-center text-6xl font-semibold text-center z-[60] text-white pointer-events-none">
        We help you set <br>
        focus and gain <br>
        impact. By adding <br>
        to the conversation, <br>
        not the noise.
    </div>

    <img
        src="./img/yellowbox.png"
        alt="yellowbox"
        data-top="0.0375" 
        class="sticky-box yellow absolute right-[55%] top-[3.75%] w-[48%] h-auto z-20">
        
    <img
        src="./img/pinkbox.png"
        alt="pinkbox"
        data-top="0.03"
        class="sticky-box pink absolute left-[36%] top-[3%] w-[15%] h-auto z-10">

    <img
        src="./img/bluebox.png"
        alt="bluebox"
        data-top="0.11"
        class="sticky-box blue absolute left-[36.6%] top-[11%] w-[45%] h-auto z-50">
        
    <img
        src="./img/left-greenbox.png"
        alt="left-greenbox"
        data-top="0.12"
        class="greenleft absolute left-[15%] top-[12%] w-[38%] h-auto z-40">
        
    <img
        src="./img/right-greenbox.png"
        alt="right-greenbox"
        class="greenright absolute right-0 top-[25%] w-[32%] h-auto z-10">

    <img
        src="./img/redbox.png"
        alt="redbox"
        class="red absolute left-[7.8%] w-[48%] h-auto top-[55.3%] z-30">
</div>

<script>
    const container = document.getElementById('animation-container');
    const stickyBoxes = document.querySelectorAll('.sticky-box');
    const redBox = document.querySelector('.red');
    const leftGreenBox = document.querySelector('.greenleft');
    const yellowBox = document.querySelector('.yellow');

    let metrics = [];

    function cacheMetrics() {
        metrics = Array.from(stickyBoxes).map(box => {
            const rect = box.getBoundingClientRect();
            const containerRect = container.getBoundingClientRect();
            
            return {
                element: box,
                initialLeftPercent: (rect.left - containerRect.left) / containerRect.width,
                widthPercent: rect.width / containerRect.width,
                topPercent: parseFloat(box.getAttribute('data-top'))
            };
        });
    }

    cacheMetrics();
    window.addEventListener('resize', cacheMetrics);

    window.addEventListener('scroll', () => {
        const containerRect = container.getBoundingClientRect();
        const redRect = redBox.getBoundingClientRect();
        const leftGreenRect = leftGreenBox.getBoundingClientRect();

        const redHasHitTop = redRect.top <= 0;
        const leftGreenHitTop = leftGreenRect.top <= 0;

        metrics.forEach(item => {
            const isGreenLeft = item.element === leftGreenBox;
            const normalElementTop = containerRect.top + (containerRect.height * item.topPercent);

            if (redHasHitTop) {
                item.element.style.position = 'absolute';
                item.element.style.top = `${item.topPercent * 100}%`;
                item.element.style.left = `${item.initialLeftPercent * 100}%`;
                item.element.style.width = `${item.widthPercent * 100}%`;
                item.element.style.transform = `translateY(${redRect.top}px)`;
            } 

          
            else if (normalElementTop <= 0) {
                item.element.classList.add('is-sticky');
                item.element.style.transform = 'none'; 
                
                item.element.style.left = `${containerRect.left + (item.initialLeftPercent * containerRect.width)}px`;
                item.element.style.width = `${item.widthPercent * containerRect.width}px`;
            } 
            else {
                item.element.classList.remove('is-sticky');
                item.element.style.position = 'absolute';
                item.element.style.top = `${item.topPercent * 100}%`;
                item.element.style.left = `${item.initialLeftPercent * 100}%`;
                item.element.style.width = `${item.widthPercent * 100}%`;
                item.element.style.transform = 'none';
            }
        });
    });


 function yellowMetrics (){
    const yellowRect = yellowBox.getBoundingClientRect();
    const containerRect = container.getBoundingClientRect();

    return {
                element: yellowBox,
                initialLeftPercent: (yellowRect.left - containerRect.left) / containerRect.width,
                widthPercent: yellowRect.width / containerRect.width,
                topPercent: parseFloat(yellowBox.getAttribute('data-top'))
            };

 }
   yellowMetrics();
   window.addEventListener('resize', yellowMetrics);

    window.addEventListener('scroll', () => {
        const containerRect = container.getBoundingClientRect();
        const leftGreenRect = leftGreenBox.getBoundingClientRect();
        const leftGreenHitTop = leftGreenRect.top <= 0;

        if (leftGreenHitTop) {
                // item.element.classList.remove('is-sticky');
                    yellowBox.style.position = 'absolute'; 
                    yellowBox.style.top = `${yellowBox.topPercent * 100}%`;
                    yellowBox.style.left = `${yellowBox.initialLeftPercent * 100}%`;
                    yellowBox.style.width = `${yellowBox.widthPercent * 100}%`;
                    yellowBox.style.transform = `translateY(${leftGreenRect.top}px)`;

            } 

        // else (normalElementTop <= 0) {
        //         item.element.classList.add('is-sticky');
        //         item.element.style.transform = 'none'; 
                
        //         item.element.style.left = `${containerRect.left + (item.initialLeftPercent * containerRect.width)}px`;
        //         item.element.style.width = `${item.widthPercent * containerRect.width}px`;
        //     } 

        // else if (leftGreenRect.top <= 0.5) {
        //   leftGreenBox.classList.add('is-sticky2');
        //   leftGreenBox.style.transform = 'none'; 
                
        //   leftGreenBox.style.left = `${containerRect.left + (leftGreenBox.initialLeftPercent * containerRect.width)}px`;
        //   leftGreenBox.style.width = `${leftGreenBox.widthPercent * containerRect.width}px`;
        // }
    });

    
</script>
     
</body>
</html>
