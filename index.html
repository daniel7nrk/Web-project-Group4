<!doctype html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/src/img/footerbox-red.png">
    <link href="./src/output.css" rel="stylesheet">
    <style>
        .is-sticky {
            position: fixed !important;
            top: 0 !important;
        }
    </style>
</head>

<body class="bg-[#EFECEA]">
    <div id="header"></div>
    <div id="hero"></div>
    <div id="contact"></div>
    <div id="footer"></div>
</body>
<script>
    const loadComponents = (id, url) => {
        return fetch(url)
            .then((response) => response.text())
            .then((html) => {
                document.getElementById(id).innerHTML = html;
            });
    }

    function initMenuEffects() {
        const menuBtn = document.getElementById('menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        const closed = document.getElementById("close");
        const heroText = document.getElementById("herotext");
        const openIconsWrapper = document.getElementById("open-icons-wrapper");

        const sectionsToToggle = document.querySelectorAll(".toggleSection");

        if (!menuBtn || !mobileMenu) {
            console.warn("Menu elements not found in the loaded templates.");
            return;
        }

        menuBtn.addEventListener('click', () => {
            const isHidden = mobileMenu.classList.contains("hidden");

            if (isHidden) {
                mobileMenu.classList.remove("hidden");
                if (heroText) heroText.classList.add("hidden");
                if (openIconsWrapper) openIconsWrapper.classList.add("hidden");
                if (closed) closed.classList.remove("hidden");

                sectionsToToggle.forEach(section => {
                    section.classList.add("hidden");
                });
            }
            else {
                mobileMenu.classList.add("hidden");
                if (heroText) heroText.classList.remove("hidden");
                if (openIconsWrapper) openIconsWrapper.classList.remove("hidden");
                if (closed) closed.classList.add("hidden");

                sectionsToToggle.forEach(section => {
                    section.classList.remove("hidden");
                });
            }
        });

        mobileMenu.addEventListener('click', (e) => {
            if (e.target.tagName === 'A') {
                menuBtn.click();
            }
        });
    }

    function initScrollEffect() {
        const container = document.getElementById('animation-container');
        const stickyBoxes = document.querySelectorAll('.sticky-box');
        const redBox = document.querySelector('.red');
        const leftGreenBox = document.querySelector('.greenleft');
        const yellowBox = document.querySelector('.yellow');

        if (!container || !redBox) return;

        let metrics = [];

        function cacheMetrics() {
            const containerRect = container.getBoundingClientRect();
            metrics = Array.from(stickyBoxes).map(box => {
                const rect = box.getBoundingClientRect();
                return {
                    element: box,
                    initialLeftPercent: (rect.left - containerRect.left) / containerRect.width,
                    widthPercent: rect.width / containerRect.width,
                    topPercent: parseFloat(box.getAttribute('data-top'))
                };
            });
        }

        cacheMetrics();
        window.addEventListener('resize', cacheMetrics);

        window.addEventListener('scroll', () => {
            const containerRect = container.getBoundingClientRect();
            const redRect = redBox.getBoundingClientRect();

            const greenMetrics = metrics.find(m => m.element === leftGreenBox);
            const greenNormalTop = containerRect.top + (containerRect.height * (greenMetrics?.topPercent || 0));

            const redHasHitTop = redRect.top <= 0;
            const leftGreenHitTop = greenNormalTop <= 0;

            metrics.forEach(item => {
                const normalElementTop = containerRect.top + (containerRect.height * item.topPercent);

                if (redHasHitTop) {
                    if (item.element === yellowBox) {
                        const yOffset = containerRect.height * ((greenMetrics?.topPercent || 0) - item.topPercent);
                        item.element.style.transform = `translateY(${yOffset}px)`;
                        item.element.classList.remove('is-sticky');
                        item.element.style.position = 'absolute';
                    } else {
                        item.element.style.position = 'absolute';
                        item.element.style.transform = `translateY(${redRect.top}px)`;
                    }
                }
                else if (leftGreenHitTop && item.element === yellowBox) {
                    item.element.classList.remove('is-sticky');
                    item.element.style.position = 'absolute';
                    const yOffset = containerRect.height * ((greenMetrics?.topPercent || 0) - item.topPercent);
                    item.element.style.transform = `translateY(${yOffset}px)`;
                }
                else if (normalElementTop <= 0) {
                    item.element.classList.add('is-sticky');
                    item.element.style.transform = 'none';
                }
                else {
                    item.element.classList.remove('is-sticky');
                    item.element.style.position = 'absolute';
                    item.element.style.transform = 'none';
                }
            });
        });
    }

    window.onload = () => {
        Promise.all([
            loadComponents('header', 'src/sections/header.html'),
            loadComponents('hero', 'src/sections/hero.html'),
            loadComponents('footer', 'src/sections/footer.html')
        ]).then(() => {
            initMenuEffects();
            initScrollEffect();
        }).catch(err => {
            console.error("Error loading templates: ", err);
        });
    }
</script>

</html>
