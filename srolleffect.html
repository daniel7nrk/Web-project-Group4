<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>document</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        .is-sticky {
            position: fixed !important;
            top: 0 !important;
        }
    </style>
</head>
<body class="bg-[#EFECEA] h-[300vh]">



<div id="animation-container" class="relative mx-auto w-full aspect-[16/10] md:aspect-[16/9] mt-12 md:mt-24 z-10 mb-12 md:mb-24">

    <img
        src="./img/pinkbox.png"
        alt="pinkbox"
        data-top="0.03"
        class="sticky-box pink absolute left-[36%] top-[3%] w-[15%] h-auto z-10">

    <img
        src="./img/right-greenbox.png"
        alt="right-greenbox"
        class="greenright absolute right-0 top-[25%] w-[32%] h-auto z-10">

    <img
        src="./img/yellowbox.png"
        alt="yellowbox"
        data-top="0.0375" 
        class="sticky-box yellow absolute right-[55%] top-[3.75%] w-[48%] h-auto z-20">

    <img
        src="./img/redbox.png"
        alt="redbox"
        class="red absolute left-[7.8%] w-[48%] h-auto lg:top-[55.3%] sm:top-[31.4%] z-30">
        
    <img
        src="./img/left-greenbox.png"
        alt="left-greenbox"
        data-top="0.12"
        class="sticky-box greenleft absolute left-[15%] top-[12%] w-[38%] h-auto z-40">
        
    <img
        src="./img/bluebox.png"
        alt="bluebox"
        data-top="0.11"
        class="sticky-box blue absolute left-[36.6%] top-[11%] w-[45%] h-auto z-50">

    <div class="bg-[#EFECEA] h-[40vh] absolute inset-x-0 top-[110%] z-[60]"></div>

    <div class="absolute inset-0 flex flex-col items-center justify-center px-4 text-center text-[#EFECEA] font-semibold text-[1.65rem] sm:text-4xl md:text-5xl lg:text-6xl z-[99]">
        <p>We help you set focus</p>
        <p>and gain impact. By adding</p>
        <p>to the conversation,</p>
        <p>not the noise.</p>
    </div>

</div>



<script>
    const container = document.getElementById('animation-container');
    const stickyBoxes = document.querySelectorAll('.sticky-box');
    const redBox = document.querySelector('.red');
    const leftGreenBox = document.querySelector('.greenleft');
    const yellowBox = document.querySelector('.yellow');

    let metrics = [];

    function cacheMetrics() {
        const containerRect = container.getBoundingClientRect();

        metrics = Array.from(stickyBoxes).map(box => {
            const rect = box.getBoundingClientRect();
            return {
                element: box,
                initialLeftPercent: (rect.left - containerRect.left) / containerRect.width,
                widthPercent: rect.width / containerRect.width,
                topPercent: parseFloat(box.getAttribute('data-top'))
            };
        });
    }

    cacheMetrics();
    window.addEventListener('resize', cacheMetrics);

    window.addEventListener('scroll', () => {
        const containerRect = container.getBoundingClientRect();
        const redRect = redBox.getBoundingClientRect();
        
        const greenMetrics = metrics.find(m => m.element === leftGreenBox);
        const greenNormalTop = containerRect.top + (containerRect.height * (greenMetrics?.topPercent || 0));
        
        const redHasHitTop = redRect.top <= 0;
        const leftGreenHitTop = greenNormalTop <= 0;

        metrics.forEach(item => {
            const normalElementTop = containerRect.top + (containerRect.height * item.topPercent);

            if (redHasHitTop) {
                if (item.element === yellowBox) {
                    const yOffset = containerRect.height * ((greenMetrics?.topPercent || 0) - item.topPercent);
                    item.element.style.transform = `translateY(${yOffset}px)`;
                } else {
                    item.element.style.position = 'absolute';
                    item.element.style.transform = `translateY(${redRect.top}px)`;
                }
            } 
            else if (leftGreenHitTop && item.element === yellowBox) {
                item.element.classList.remove('is-sticky');
                item.element.style.position = 'absolute';
                const yOffset = containerRect.height * ((greenMetrics?.topPercent || 0) - item.topPercent);
                item.element.style.transform = `translateY(${yOffset}px)`;
            }
            else if (normalElementTop <= 0) {
                item.element.classList.add('is-sticky');
                item.element.style.transform = 'none'; 
            } 
            else {
                item.element.classList.remove('is-sticky');
                item.element.style.position = 'absolute';
                item.element.style.transform = 'none';
            }
        });
    });
</script>
</body>
</html>
