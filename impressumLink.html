<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="./src/output.css" rel="stylesheet">
</head>
<body class="bg-[#EFECEA]">
    <div id="header"></div>
    <div id="contact"></div>
    <div id="footer"></div>
</body>
<script>
    const loadComponents = (id, url) => {
        return fetch(url)
            .then((response) => response.text())
            .then((html) => {
                document.getElementById(id).innerHTML = html;
            });
    }

    function initMenuEffects() {
        const menuBtn = document.getElementById('menu-btn');    
        if (!menuBtn) {
            console.warn("Menu button not found in the loaded templates.");
            return;
        }

        menuBtn.addEventListener('click', () => {
            window.location.href = 'index.html';
        });
    }

    window.onload = () => {
        Promise.all([
            loadComponents('header', 'src/sections/headerGreen.html'),
            loadComponents('contact', 'src/sections/contact.html'),
            loadComponents('footer', 'src/sections/footerGreen.html')
        ]).then(() => {
            initMenuEffects();
        }).catch(err => {
            console.error("Error loading templates: ", err);
        });
    }
</script>
</html>
